name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PHP_VERSION: "8.2"
  NODE_VERSION: "20"

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_mysql, sqlite3
          tools: composer:v2
          coverage: none

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Validate composer config
        working-directory: backend
        run: composer validate --strict

      - name: Run backend tests
        working-directory: backend
        run: composer test

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, backend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install backend dependencies
        working-directory: backend
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Deploy to server via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude=".env" --exclude="storage/logs" --exclude="storage/framework/sessions" --exclude="storage/app/public" --exclude="database/database.sqlite"
          path: ./
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Run post-deployment commands
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}/backend

            # Set permissions
            mkdir -p resources/views
            php artisan storage:link || true
            sudo chown -R www-data:www-data storage bootstrap/cache database
            sudo chown -h www-data:www-data public/storage || true
            sudo chmod -R ug+rwX storage bootstrap/cache database

            # Run migrations
            php artisan migrate --force

            # Clear and rebuild caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Restart PHP-FPM
            sudo systemctl reload php8.3-fpm || sudo systemctl reload php8.2-fpm || true

            # Restart queue worker if applicable
            php artisan queue:restart || true
